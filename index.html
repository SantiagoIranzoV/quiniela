<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#05080F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quiniela 26">
<title>Quiniela Mundial 26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* fondo: casi negro */
    --bg0:#05080F; --bg1:#0A101F; --dpanel:#0F1729; --dline:#1B2440; --dline2:#27345A;
    --ltxt:#D9E0F0; --lmut:#8B97B8;
    /* tarjetas claras */
    --card:#FFFFFF; --card2:#F2F5FB; --wellL:#EFF2F8; --line:#E3E8F2; --line2:#C9D2E4;
    --ink:#13203E; --mut:#5E6B8C;
    /* acentos */
    --gold:#E8C35A; --goldd:#A8821D; --gold-soft:#E8C35A26; --gold-line:#E8C35A66; --gold-tint:#FBF4DC;
    --navy:#0E1A3C; --navy2:#1A2750;
    --green:#157A47; --green-tint:#DFF3E8;
    --red:#C22835; --red-tint:#FBE3E5;
    --steel:#8FA8D8;
    --nav-h:62px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:"Barlow",system-ui,sans-serif;color:var(--ltxt);font-size:14px;line-height:1.45;min-height:100dvh;
    background:radial-gradient(760px 400px at 85% -8%, #16224422 0%, transparent 55%),
               radial-gradient(640px 400px at -10% 105%, #121c3a22 0%, transparent 50%), var(--bg0)}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit}
  .bc{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.04em}

  /* ============ LOGIN ============ */
  #login{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .crest{width:78px;height:90px;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:20px;
    background:linear-gradient(165deg,#16224A,#0B1226);
    clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);
    box-shadow:inset 0 0 0 2px var(--gold-line)}
  .crest .n{font-family:"Barlow Condensed";font-weight:800;font-size:36px;color:var(--gold);line-height:1}
  .crest::before{content:"";position:absolute;left:16%;right:16%;top:12px;height:2px;background:var(--gold)}
  .lcard{background:linear-gradient(180deg,#FFFFFF,#F2F5FB);border:1px solid var(--line);border-radius:20px;padding:30px 26px;width:100%;max-width:380px;color:var(--ink);box-shadow:0 30px 80px -30px rgba(0,0,0,.85)}
  .lcard h1{margin:0;font-size:32px;line-height:.95;font-weight:800;color:var(--ink)}
  .lcard h1 em{font-style:normal;color:var(--goldd)}
  .lcard .sub{font-size:11px;letter-spacing:.28em;color:var(--mut);margin:8px 0 22px;font-weight:600}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin:14px 0 7px}
  .lcard input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line2);background:#fff;color:var(--ink);font-size:16px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
  .lcard input::placeholder{color:#9AA6C2}
  .lcard input:focus{outline:none;border-color:var(--goldd);box-shadow:0 0 0 3px var(--gold-soft)}
  .btn{width:100%;margin-top:22px;padding:14px;border:none;border-radius:12px;background:var(--gold);color:#161200;font-size:16px;font-weight:800;font-family:"Barlow Condensed";text-transform:uppercase;letter-spacing:.1em;transition:filter .15s,transform .08s}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
  .err{color:var(--red);font-size:13px;margin-top:12px;min-height:16px;font-weight:600}
  .lhint{font-size:11.5px;color:var(--lmut);margin-top:18px;text-align:center;max-width:330px;line-height:1.5}

  /* ============ SHELL ============ */
  header.app{position:sticky;top:0;z-index:30;background:rgba(5,8,15,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--dline);padding-top:max(env(safe-area-inset-top),14px)}
  .hrow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .mini{width:30px;height:35px;background:linear-gradient(165deg,#16224A,#0B1226);clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1.5px var(--gold-line)}
  .brand .mini span{font-family:"Barlow Condensed";font-weight:800;font-size:15px;color:var(--gold)}
  .brand .t{font-family:"Barlow Condensed";font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:.05em;line-height:1;color:#fff}
  .brand .t small{display:block;font-size:9px;letter-spacing:.3em;color:var(--lmut);font-weight:600;margin-top:2px}
  .hbtns{display:flex;align-items:center;gap:8px}
  .hbtn{width:32px;height:32px;border-radius:50%;border:1px solid var(--dline2);background:var(--dpanel);color:var(--lmut);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
  .hbtn.on{border-color:var(--gold);color:var(--gold);background:#E8C35A1A}
  .av{width:32px;height:32px;border-radius:50%;background:var(--gold);color:#161200;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;border:none}
  main{max-width:680px;margin:0 auto;padding:12px 12px calc(var(--nav-h) + 86px)}

  /* hero matchday — tarjeta clara */
  .hero{position:relative;background:linear-gradient(130deg,#FFFFFF 0%,#F4F7FD 100%);border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:13px;display:flex;align-items:center;gap:14px;overflow:hidden;color:var(--ink);box-shadow:0 14px 34px -18px rgba(0,0,0,.7)}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(280px 120px at 0% 0%, var(--gold-soft), transparent 65%);pointer-events:none}
  .hrank{display:flex;align-items:center;gap:11px;flex-shrink:0}
  .hrank .hbadge{width:52px;height:58px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(165deg,var(--navy2),var(--navy));clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%);
    box-shadow:inset 0 0 0 1.5px var(--gold-line)}
  .hrank .hbadge span{font-family:"Barlow Condensed";font-weight:800;font-size:24px;color:var(--gold)}
  .hrank .hs .hl{font-size:9px;letter-spacing:.16em;color:var(--mut);font-weight:800;text-transform:uppercase}
  .hrank .hs .hv{font-family:"Barlow Condensed";font-weight:800;font-size:19px;letter-spacing:.03em;margin-top:1px;color:var(--ink)}
  .hrank .hs .hv b{color:var(--goldd)}
  .hrank .hs .hx{font-size:10px;color:var(--mut);font-weight:600;margin-top:1px}
  .hero .hnext{flex:1;min-width:0;text-align:right}
  .hero .hnext .hl{font-size:9px;letter-spacing:.16em;color:var(--mut);font-weight:800;text-transform:uppercase}
  .hero .hnext .hm{font-family:"Barlow Condensed";font-weight:800;font-size:18px;letter-spacing:.05em;margin-top:2px;color:var(--ink)}
  .hero .hnext .hm .g{color:var(--goldd)}
  .hero .hnext .hd{font-size:10px;color:var(--mut);font-weight:700;margin-top:1px;letter-spacing:.06em}
  /* separador de sección (sobre fondo oscuro) */
  .sech{display:flex;align-items:center;gap:10px;margin:15px 2px 9px}
  .sech .st1{font-family:"Barlow Condensed";font-weight:800;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--lmut)}
  .sech .st1 b{color:var(--gold)}
  .sech .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--dline2),transparent)}

  /* riel de chips — dock redondeado */
  .rail{position:sticky;top:calc(60px + env(safe-area-inset-top));z-index:25;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
    background:rgba(10,16,31,.92);backdrop-filter:blur(12px);
    border:1px solid var(--dline2);border-radius:15px;padding:6px;margin-bottom:12px;
    box-shadow:0 12px 30px -14px rgba(0,0,0,.8)}
  .rail::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;min-width:38px;padding:7px 12px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--lmut);font-family:"Barlow Condensed";font-weight:700;font-size:15px;letter-spacing:.05em;transition:all .14s;position:relative}
  .chip .dot{position:absolute;top:5px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
  .chip.act{background:var(--gold);border-color:var(--gold);color:#161200}
  .chip.act .dot{background:#161200}

  /* panel claro */
  .panel{background:linear-gradient(180deg,#FFFFFF,#F4F7FD);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:12px;color:var(--ink);box-shadow:0 14px 34px -20px rgba(0,0,0,.65)}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--line)}
  .phead .t{font-family:"Barlow Condensed";font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink)}
  .phead .t .g{color:var(--goldd)}
  .phead .st{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--mut);text-transform:uppercase}
  .phead .st.full{color:var(--green)}
  .srow{display:grid;grid-template-columns:28px 1fr auto 42px;align-items:center;gap:8px;padding:8px 15px;border-bottom:1px solid var(--line);font-size:13px}
  .srow:last-child{border-bottom:none}
  .srow .pos{font-family:"Barlow Condensed";font-weight:800;font-size:14px;color:var(--mut);text-align:center}
  .srow.q{background:var(--gold-tint)}
  .srow.q .pos{color:var(--goldd)}
  .srow .tm{display:flex;align-items:center;gap:8px;min-width:0;font-weight:600;color:var(--mut)}
  .srow.q .tm{color:var(--ink);font-weight:700}
  .srow .tm .fl{font-size:17px}
  .srow .tm .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow .rec{font-size:11px;color:var(--mut);font-weight:600;font-variant-numeric:tabular-nums}
  .srow .pp{justify-self:end;min-width:30px;height:24px;padding:0 7px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--wellL);font-family:"Barlow Condensed";font-weight:800;font-size:15px;color:var(--ink)}
  .srow.q .pp{background:var(--gold);color:#161200}
  .sempty{padding:13px;font-size:12px;color:var(--mut);text-align:center}

  /* ticket de partido — claro con videomarcador navy */
  .tk{background:linear-gradient(180deg,#FFFFFF,#F4F7FD);border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden;color:var(--ink);box-shadow:0 14px 34px -20px rgba(0,0,0,.6)}
  .tk .top{display:flex;justify-content:space-between;align-items:center;padding:9px 14px 0;font-size:10px;letter-spacing:.12em;color:var(--mut);font-weight:700;text-transform:uppercase}
  .badge{padding:3px 9px;border-radius:9px;font-size:9px;font-weight:800;letter-spacing:.1em}
  .badge.open{background:var(--green-tint);color:var(--green)}
  .badge.live{background:var(--red-tint);color:var(--red)}
  .badge.done{background:var(--gold-tint);color:var(--goldd)}
  .tk .mid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:10px 14px 13px}
  .tcol{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
  .tcol .fl{font-size:30px;line-height:1}
  .tcol .ab{font-family:"Barlow Condensed";font-weight:800;font-size:14px;letter-spacing:.1em;color:var(--goldd)}
  .tcol .nm{font-size:10.5px;color:var(--mut);font-weight:600;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .digits{display:flex;align-items:center;gap:7px;background:var(--navy);border-radius:14px;padding:6px 9px;box-shadow:0 8px 18px -8px rgba(14,26,60,.6)}
  .digits input{width:42px;height:48px;text-align:center;font-family:"Barlow Condensed";font-weight:800;font-size:26px;color:#fff;background:var(--navy2);border:1.5px solid #2A3A6B;border-radius:10px;font-variant-numeric:tabular-nums;transition:border-color .15s,box-shadow .15s}
  .digits input::placeholder{color:#54639B}
  .digits input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px #E8C35A33}
  .digits input:disabled{color:var(--steel);opacity:1;border-color:#22305A}
  .digits .c{color:var(--gold);font-family:"Barlow Condensed";font-weight:800;font-size:15px}
  /* tarjeta finalizada: atenuada para no competir con lo editable */
  .tk.fin{opacity:.74;filter:saturate(.85)}
  .tk.fin:hover{opacity:1}
  .tk.fin .tcol .fl{filter:grayscale(.2)}
  /* barra de resultado oficial destacada */
  .resbar{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 14px 11px;padding:8px 12px;border-radius:11px;
    background:linear-gradient(180deg,var(--navy2),var(--navy));box-shadow:0 6px 16px -8px rgba(14,26,60,.5)}
  .resbar .rl{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:#9FB0D8;font-weight:800}
  .resbar .rscore{font-family:"Barlow Condensed";font-weight:800;font-size:22px;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.04em}
  .pt{font-family:"Barlow Condensed";font-weight:800;font-size:12px;border-radius:6px;padding:2px 8px;letter-spacing:.05em}
  .pt.p3{background:var(--green-tint);color:var(--green)}
  .pt.p1{background:var(--gold-tint);color:var(--goldd)}
  .pt.p0{background:var(--red-tint);color:var(--red)}
  /* toggle de pronósticos (desplegable) */
  .ptog{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px;border:none;border-top:1px dashed var(--line2);background:transparent;color:var(--mut);font-family:inherit}
  .ptog .h{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800}
  .ptog .chev{font-size:16px;line-height:1;transition:transform .2s;color:var(--mut)}
  .ptog .chev.op{transform:rotate(180deg)}
  .ptog:active{background:var(--wellL)}
  /* pronósticos dentro del ticket */
  .preds{padding:2px 14px 11px;overflow:hidden}
  .preds.hide{display:none}
  .prow{display:flex;align-items:center;gap:9px;padding:5px 9px;border-radius:9px;background:var(--wellL);font-size:12.5px;margin-bottom:4px;color:var(--ink)}
  .prow:last-child{margin-bottom:0}
  .prow .pav{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
  .prow.mine .pav{background:var(--gold);color:#161200}
  .prow .pn{flex:1;color:var(--mut);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prow.mine .pn{color:var(--ink);font-weight:700}
  .prow .ps{font-family:"Barlow Condensed";font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .prow .pm{font-size:9.5px;font-weight:800;border-radius:5px;padding:1px 6px}
  .prow.h3{background:var(--green-tint)} .prow.h3 .pm{background:var(--green);color:#fff}
  .prow.h1{background:var(--gold-tint)} .prow.h1 .pm{background:var(--gold);color:#161200}
  .prow.h0 .pm{background:var(--red-tint);color:var(--red)}

  .lead{color:var(--lmut);font-size:12px;margin:2px 2px 12px}
  .lead b{color:var(--ltxt)}
  .ppc{background:linear-gradient(180deg,#FFFFFF,#F4F7FD);border:1px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden;color:var(--ink);box-shadow:0 14px 34px -20px rgba(0,0,0,.6)}
  .ppc .pph{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line)}
  .ppc .ppt{font-family:"Barlow Condensed";font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:7px;color:var(--ink)}
  .ppc .ppr{font-size:11px;color:var(--mut);font-weight:700;letter-spacing:.08em}
  .ppc .ppr b{color:var(--goldd);font-family:"Barlow Condensed";font-size:15px}
  .ppc .pl{padding:9px 14px}
  .ppempty{color:var(--lmut);font-size:13px;text-align:center;padding:42px 18px;background:var(--dpanel);border:1px dashed var(--dline2);border-radius:16px;line-height:1.7}

  /* especiales v2 — placas de premio (tarjetas claras) */
  .xstatus{display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#E8C35A1C,transparent 70%);border:1px solid var(--gold-line);border-radius:13px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--lmut)}
  .xstatus.lk{background:linear-gradient(90deg,#C2283526,transparent 70%);border-color:#C2283566}
  .xstatus .ic{font-size:16px}
  .xstatus b{color:var(--ltxt)}
  .xgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .xcard{position:relative;background:linear-gradient(165deg,#FFFFFF 0%,#F2F5FB 100%);border:1px solid var(--line);border-radius:16px;padding:14px 14px 13px;overflow:hidden;display:flex;flex-direction:column;color:var(--ink);box-shadow:0 14px 34px -20px rgba(0,0,0,.6)}
  .xcard.heroX{grid-column:1/-1;border-color:var(--gold-line);padding:17px 16px 15px}
  .xcard.heroX::before{content:"";position:absolute;inset:0;background:radial-gradient(320px 150px at 18% -10%, var(--gold-soft), transparent 70%);pointer-events:none}
  .xcard.win{box-shadow:0 0 0 1.5px var(--gold),0 12px 30px -12px rgba(232,195,90,.5)}
  .xtop{display:flex;align-items:center;gap:11px;margin-bottom:12px}
  .xmed{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;
    background:radial-gradient(circle at 32% 28%, var(--navy2), var(--navy));border:1.5px solid var(--gold-line)}
  .heroX .xmed{width:52px;height:52px;font-size:24px;box-shadow:0 8px 22px -8px rgba(232,195,90,.5)}
  .xtit{flex:1;min-width:0}
  .xtit .l{font-family:"Barlow Condensed";font-weight:800;font-size:15px;letter-spacing:.06em;text-transform:uppercase;line-height:1.05;color:var(--ink)}
  .heroX .xtit .l{font-size:19px}
  .xtit .s{font-size:9px;color:var(--mut);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
  .xcard:not(.heroX) .xtit .s{display:none}
  .xcard:not(.heroX) .xtit .l{font-size:14px}
  .xpts{font-family:"Barlow Condensed";font-weight:800;font-size:21px;color:var(--goldd);line-height:1;text-align:right}
  .heroX .xpts{font-size:27px}
  .xpts small{display:block;font-size:8px;letter-spacing:.16em;color:var(--mut);font-weight:700;margin-top:2px}
  .plq{margin-top:auto}
  .plq .pl{font-size:8.5px;letter-spacing:.2em;color:var(--mut);font-weight:800;text-transform:uppercase;margin-bottom:4px;text-align:center}
  .plq input,.plq .pv{display:block;width:100%;text-align:center;background:transparent;border:none;border-bottom:1.5px solid var(--line2);
    font-family:"Barlow Condensed";font-weight:800;font-size:21px;letter-spacing:.05em;text-transform:uppercase;color:var(--goldd);padding:2px 4px 7px}
  .heroX .plq input,.heroX .plq .pv{font-size:26px}
  .plq input::placeholder{color:#9AA6C2;font-weight:600;text-transform:none;letter-spacing:0}
  .plq input:focus{outline:none;border-bottom-color:var(--goldd)}
  .plq .pv.empty{color:#9AA6C2;font-weight:600}
  .xoff{display:flex;justify-content:center;align-items:center;gap:7px;margin-top:9px;font-size:11px;color:var(--green);font-weight:700}
  .xoth{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;justify-content:center}
  .xoth .oc{display:inline-flex;align-items:center;gap:6px;background:var(--wellL);border:1px solid var(--line);border-radius:18px;padding:3px 10px 3px 3px;font-size:10.5px;color:var(--mut);font-weight:600}
  .xoth .oc .oa{width:17px;height:17px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800}
  .xoth .oc b{color:var(--ink);font-weight:700}
  .xadm{margin-top:10px;display:flex;gap:8px;align-items:center;opacity:.9}
  .xadm .al{font-size:9px;color:var(--red);font-weight:800;letter-spacing:.1em;white-space:nowrap}

<script>
const API = "https://wc-worker.santiagoiranzo.workers.dev";
const FLAGS = {"Mexico":"🇲🇽","South Africa":"🇿🇦","Korea Republic":"🇰🇷","Czechia":"🇨🇿","Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭","Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","United States":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkiye":"🇹🇷","Germany":"🇩🇪","Curacao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨","Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳","Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿","Spain":"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴","Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"};
const NAMES = {"Mexico":"México","South Africa":"Sudáfrica","Korea Republic":"Corea del Sur","Czechia":"Chequia","Canada":"Canadá","Bosnia and Herzegovina":"Bosnia","Qatar":"Catar","Switzerland":"Suiza","Brazil":"Brasil","Morocco":"Marruecos","Haiti":"Haití","Scotland":"Escocia","United States":"EE. UU.","Paraguay":"Paraguay","Australia":"Australia","Turkiye":"Turquía","Germany":"Alemania","Curacao":"Curazao","Ivory Coast":"C. Marfil","Ecuador":"Ecuador","Netherlands":"P. Bajos","Japan":"Japón","Sweden":"Suecia","Tunisia":"Túnez","Belgium":"Bélgica","Egypt":"Egipto","Iran":"Irán","New Zealand":"N. Zelanda","Spain":"España","Cape Verde":"Cabo Verde","Saudi Arabia":"A. Saudí","Uruguay":"Uruguay","France":"Francia","Senegal":"Senegal","Iraq":"Irak","Norway":"Noruega","Argentina":"Argentina","Algeria":"Argelia","Austria":"Austria","Jordan":"Jordania","Portugal":"Portugal","DR Congo":"RD Congo","Uzbekistan":"Uzbekistán","Colombia":"Colombia","England":"Inglaterra","Croatia":"Croacia","Ghana":"Ghana","Panama":"Panamá"};
const ABBRS = {"Mexico":"MEX","South Africa":"RSA","Korea Republic":"KOR","Czechia":"CZE","Canada":"CAN","Bosnia and Herzegovina":"BIH","Qatar":"QAT","Switzerland":"SUI","Brazil":"BRA","Morocco":"MAR","Haiti":"HAI","Scotland":"SCO","United States":"USA","Paraguay":"PAR","Australia":"AUS","Turkiye":"TUR","Germany":"GER","Curacao":"CUW","Ivory Coast":"CIV","Ecuador":"ECU","Netherlands":"NED","Japan":"JPN","Sweden":"SWE","Tunisia":"TUN","Belgium":"BEL","Egypt":"EGY","Iran":"IRN","New Zealand":"NZL","Spain":"ESP","Cape Verde":"CPV","Saudi Arabia":"KSA","Uruguay":"URU","France":"FRA","Senegal":"SEN","Iraq":"IRQ","Norway":"NOR","Argentina":"ARG","Algeria":"ALG","Austria":"AUT","Jordan":"JOR","Portugal":"POR","DR Congo":"COD","Uzbekistan":"UZB","Colombia":"COL","England":"ENG","Croatia":"CRO","Ghana":"GHA","Panama":"PAN"};
const STAGE_NAMES={R32:"Ronda de 32",R16:"Octavos",QF:"Cuartos",SF:"Semifinales",TP:"3er puesto",FN:"Final"};
const STAGE_ORDER=["R32","R16","QF","SF","TP","FN"];
let STATE=null, DIRTY={}, SAVE_TIMER=null, GSEL=null, SSEL=null, VIEW="grupos", OPEN=new Set(), ADMIN_DIRTY=false;
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const flag=t=>FLAGS[t]||"⚽";
const name=t=>NAMES[t]||t;
const ab=t=>ABBRS[t]||t.slice(0,3).toUpperCase();
const esc=s=>String(s).replace(/"/g,'&quot;');
const ini=n=>n.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}

/* auth por token (móvil OK, sin cookies) */
function getToken(){try{return localStorage.getItem("wc_token")||"";}catch{return "";}}
function setToken(t){try{t?localStorage.setItem("wc_token",t):localStorage.removeItem("wc_token");}catch{}}
async function api(path,opts={}){
  const headers={"Content-Type":"application/json",...(opts.headers||{})};
  const tk=getToken(); if(tk)headers["Authorization"]="Bearer "+tk;
  const r=await fetch(API+path,{...opts,headers});
  const d=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||("Error "+r.status));
  return d;
}
$("#loginBtn").onclick=doLogin;
$("#p").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
$("#u").addEventListener("keydown",e=>{if(e.key==="Enter")$("#p").focus();});
async function doLogin(){
  const username=$("#u").value.trim(), pin=$("#p").value.trim();
  $("#loginErr").textContent="";
  if(!username||!pin){$("#loginErr").textContent="Escribe tu usuario y tu clave.";return;}
  try{const res=await api("/api/login",{method:"POST",body:JSON.stringify({username,pin})});
    if(res.token)setToken(res.token);
    if(res.firstTime)toast("Clave fijada. ¡Bienvenido!");
    await boot();
  }catch(e){$("#loginErr").textContent=e.message==="Failed to fetch"?"Sin conexión con el servidor.":e.message;}
}
async function boot(){
  if(!getToken()){show(false);return;}
  try{STATE=await api("/api/state");}catch(e){setToken("");show(false);return;}
  show(true);
  $("#uAv").textContent=ini(STATE.user.name);
  $$(".admin-only").forEach(el=>el.classList.toggle("hidden",!STATE.user.isAdmin));
  if(!GSEL){ // primer grupo con pronósticos pendientes
    const myMap=Object.fromEntries(STATE.myPredictions.map(p=>[p.matchId,p]));
    const gs=[...new Set(STATE.matches.filter(m=>m.stage==="group").map(m=>m.group))].sort();
    GSEL=gs.find(g=>STATE.matches.some(m=>m.stage==="group"&&m.group===g&&!m.locked&&!myMap[m.id]))||gs[0];
  }
  if(!SSEL)SSEL="R32";
  DIRTY={};renderAll();updateSavebar();
}
function show(app){$("#login").classList.toggle("hidden",app);$("#app").classList.toggle("hidden",!app);}
function renderAll(){renderHoy();renderGrupos();renderCruces();renderPicks();renderEspeciales();renderRanking();renderReglas();if(STATE.user.isAdmin)renderResultados();}
function go(v){
  const wasAdmin=VIEW==="resultados";

const fmtKick=iso=>new Date(iso).toLocaleString("es-ES",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}).toUpperCase();
const pcls=p=>p===3?"3":p===1?"1":"0";
const scorePts=(hp,ap,hs,as_)=>{if(hp===hs&&ap===as_)return 3;return Math.sign(hp-ap)===Math.sign(hs-as_)?1:0;};
const myMapNow=()=>Object.fromEntries(STATE.myPredictions.map(p=>[p.matchId,p]));
function othersFor(mid){const o={};STATE.othersPredictions.forEach(p=>{(o[p.matchId]=o[p.matchId]||[]).push(p);});return o[mid]||[];}

function myStandings(ms,myMap){
  const tbl={};const en=t=>(tbl[t]=tbl[t]||{team:t,pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0});
  ms.forEach(m=>{en(m.home);en(m.away);});
  ms.forEach(m=>{
    const d=DIRTY[m.id],mn=myMap[m.id]||{};
    const h=d&&d.home!==''?d.home:mn.home, a=d&&d.away!==''?d.away:mn.away;
    if(h==null||a==null)return;
    const H=tbl[m.home],A=tbl[m.away];
    H.pj++;A.pj++;H.gf+=h;H.gc+=a;A.gf+=a;A.gc+=h;
    if(h>a){H.g++;A.p++;H.pts+=3;}else if(h<a){A.g++;H.p++;A.pts+=3;}else{H.e++;A.e++;H.pts++;A.pts++;}
  });
  return Object.values(tbl).map(r=>({...r,dg:r.gf-r.gc}))
    .sort((x,y)=>y.pts-x.pts||y.dg-x.dg||y.gf-x.gf||name(x.team).localeCompare(name(y.team)));
}
function standHTML(ms,myMap){
  const st=myStandings(ms,myMap);
  if(!st.some(r=>r.pj>0))return `<div class="stand"><div class="sempty">Escribe tus marcadores y tu tabla aparece aquí.</div></div>`;
  let h=`<div class="stand">`;
  st.forEach((r,i)=>{
    h+=`<div class="srow ${i<2?'q':''}"><span class="pos">${i+1}</span>
      <span class="tm"><span class="fl">${flag(r.team)}</span><span class="nm">${name(r.team)}</span></span>
      <span class="rec">${r.g}-${r.e}-${r.p} · ${r.dg>0?'+':''}${r.dg}</span>
      <span class="pp">${r.pts}</span></div>`;
  });
  return h+`</div>`;
}
function predsHTML(m){
  if(!m.locked)return "";
  const mn=myMapNow()[m.id]||{};
  const hasRes=m.homeScore!=null&&m.awayScore!=null;
  const list=[];
  if(mn.home!=null)list.push({n:STATE.user.name,h:mn.home,a:mn.away,me:true});
  othersFor(m.id).forEach(o=>list.push({n:o.name,h:o.home,a:o.away,me:false}));
  if(!list.length)return "";
  const open=OPEN.has(m.id);
  let out=`<button class="ptog" data-tog="${m.id}"><span class="h">Pronósticos · ${list.length}</span><span class="chev ${open?'op':''}">⌄</span></button>
    <div class="preds ${open?'':'hide'}" data-preds="${m.id}">`;
  list.sort((a,b)=>a.me?-1:b.me?1:a.n.localeCompare(b.n)).forEach(p=>{
    let cls="",mk="";
    if(hasRes){const pt=scorePts(p.h,p.a,m.homeScore,m.awayScore);cls="h"+pcls(pt);mk=`<span class="pm">+${pt}</span>`;}
    out+=`<div class="prow ${cls} ${p.me?'mine':''}"><span class="pav">${ini(p.n)}</span><span class="pn">${p.n}</span><span class="ps">${p.h} – ${p.a}</span>${mk}</div>`;
  });
  return out+`</div>`;
}
function ticket(m,myMap){
  const mn=myMap[m.id]||{},d=DIRTY[m.id];
  const hv=d?d.home:(mn.home??""), av=d?d.away:(mn.away??"");
  const dis=m.locked?"disabled":"";
  const hasRes=m.homeScore!=null&&m.awayScore!=null;
  const myPt=(m.locked&&hasRes&&mn.home!=null)?scorePts(mn.home,mn.away,m.homeScore,m.awayScore):null;
  const bdg=m.locked?(hasRes?'<span class="badge done">Finalizado</span>':'<span class="badge live">En juego</span>'):'<span class="badge open">Editable</span>';
  // los finalizados se atenúan para no competir con lo editable
  let h=`<div class="tk ${hasRes?'fin':''}" data-match="${m.id}">
    <div class="top"><span>${fmtKick(m.kickoff)}</span>${bdg}</div>
    <div class="mid">
      <div class="tcol"><span class="fl">${flag(m.home)}</span><span class="ab bc">${ab(m.home)}</span><span class="nm">${name(m.home)}</span></div>
      <div class="digits">
        <input inputmode="numeric" pattern="\\d*" maxlength="2" value="${hv}" ${dis} data-mid="${m.id}" data-side="home" placeholder="–">
        <span class="c">VS</span>
        <input inputmode="numeric" pattern="\\d*" maxlength="2" value="${av}" ${dis} data-mid="${m.id}" data-side="away" placeholder="–">
      </div>
      <div class="tcol"><span class="fl">${flag(m.away)}</span><span class="ab bc">${ab(m.away)}</span><span class="nm">${name(m.away)}</span></div>
    </div>`;
  if(m.locked&&hasRes){
    h+=`<div class="resbar"><span class="rl">Resultado oficial</span>
        <span class="rscore">${m.homeScore} – ${m.awayScore}</span>`;
    if(myPt!=null)h+=`<span class="pt p${pcls(myPt)}">+${myPt} pts</span>`;
    h+=`</div>`;
  }
  return h+predsHTML(m)+`</div>`;
}
/* ===== HOY: partidos de las próximas 24 h ===== */
function renderHoy(){
  const myMap=myMapNow();
  const now=Date.now(), in24=now+24*3600e3;
  // próximas 24 h: desde ahora hasta +24 h
  const soon=STATE.matches.filter(m=>{const t=new Date(m.kickoff).getTime();return t>=now&&t<=in24;})
    .sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
  // en juego ahora mismo (empezados sin resultado)
  const live=STATE.matches.filter(m=>m.locked&&m.homeScore==null)
    .sort((a,b)=>new Date(b.kickoff)-new Date(a.kickoff));
  let h=`<p class="lead">Partidos de las <b>próximas 24 horas</b> y los que están en juego ahora.</p>`;
  if(live.length){
    h+=`<div class="sech"><span class="st1">⚽ <b>En juego</b></span><span class="ln"></span></div>`;
    h+=live.map(m=>ticket(m,myMap)).join("");
  }
  if(soon.length){
    h+=`<div class="sech"><span class="st1">Próximas <b>24 h</b> · ${soon.length}</span><span class="ln"></span></div>`;
    h+=soon.map(m=>ticket(m,myMap)).join("");
  }
  if(!live.length&&!soon.length){
    const next=STATE.matches.filter(m=>new Date(m.kickoff).getTime()>now).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff))[0];
    h+=`<div class="ppempty">No hay partidos en las próximas 24 horas.${next?`<br>El siguiente es <b style="color:var(--gold)">${ab(next.home)} – ${ab(next.away)}</b><br>${fmtKick(next.kickoff)}.`:''}</div>`;

}

// tabla oficial de un grupo (resultados reales) usando el orden que ya calculó el servidor
function officialTableHTML(g,ms){
  const complete=ms.every(m=>m.homeScore!=null&&m.awayScore!=null);
  if(!complete)return `<div class="otnote">La tabla oficial aparecerá cuando los ${ms.length} partidos tengan resultado.</div>`;
  // el servidor ya devuelve standings[g] ordenado (directo→dg→gf, o el orden manual)
  const st=(STATE.standings||{})[g]||[];
  if(st.length<2)return "";
  // detectar empates a puntos para marcar qué filas se pueden reordenar
  let h=`<div class="ottable" data-g="${g}"><div class="othead">Tabla oficial · Grupo ${g} <span class="otsub">↑↓ para reordenar empates</span></div>`;
  st.forEach((r,i)=>{
    const tiedAdj=(i>0&&st[i-1].pts===r.pts)||(i<st.length-1&&st[i+1].pts===r.pts);
    const cls=i<2?"qz":"";
    h+=`<div class="otrow ${cls}" data-team="${esc(r.team)}">
      <span class="otp">${i+1}</span>
      <span class="ott">${flag(r.team)} ${name(r.team)}</span>
      <span class="otpts">${r.pts}p · ${r.dg>0?'+':''}${r.dg} · ${r.gf}gf</span>
      <span class="otmove">${tiedAdj?`<button class="otup" data-g="${g}" data-i="${i}" ${i===0||st[i-1].pts!==r.pts?'disabled':''}>▲</button><button class="otdn" data-g="${g}" data-i="${i}" ${i===st.length-1||st[i+1].pts!==r.pts?'disabled':''}>▼</button>`:''}</span>
    </div>`;
  });
  const hasManual=(STATE.manualOrders||{})[g];
  if(hasManual)h+=`<button class="otreset" data-g="${g}">↺ Volver al orden automático</button>`;
  return h+`</div>`;
}
function aRow(m,ko){
  const filled=m.homeScore!=null?"filled":"";
  const nm=ko
    ?`<div class="ti"><input data-team="${m.id}" data-side="home" value="${m.home==='Por definir'?'':esc(m.home)}" placeholder="Local"><input data-team="${m.id}" data-side="away" value="${m.away==='Por definir'?'':esc(m.away)}" placeholder="Visitante"></div>`
    :`<div class="anm"><div class="t">${flag(m.home)} ${name(m.home)} – ${name(m.away)} ${flag(m.away)}</div><div class="k">${fmtKick(m.kickoff)}</div></div>`;
  return `<div class="arow ${filled}">${nm}<div class="si">
    <input inputmode="numeric" maxlength="2" data-adm="${m.id}" data-side="home" value="${m.homeScore??''}">
    <span class="c">–</span>
    <input inputmode="numeric" maxlength="2" data-adm="${m.id}" data-side="away" value="${m.awayScore??''}"></div></div>`;
}

/* ===== edición ===== */
function wire(scope){
  $$(scope+' .digits input:not([disabled])').forEach(inp=>{
    inp.addEventListener('input',()=>{
      inp.value=inp.value.replace(/\D/g,'').slice(0,2);
      const mid=+inp.dataset.mid;
      const home=$(`${scope} .digits input[data-mid="${mid}"][data-side="home"]`).value;
      const away=$(`${scope} .digits input[data-mid="${mid}"][data-side="away"]`).value;
      DIRTY[mid]={home:home===''?'':+home,away:away===''?'':+away};
      updateSavebar();scheduleSave();liveStanding(mid);
    });
  });
  $$(scope+' .ptog').forEach(btn=>btn.addEventListener('click',()=>{
    const mid=+btn.dataset.tog;
    const box=$(`${scope} [data-preds="${mid}"]`), chev=btn.querySelector('.chev');
    if(OPEN.has(mid)){OPEN.delete(mid);box.classList.add('hide');chev.classList.remove('op');}
    else{OPEN.add(mid);box.classList.remove('hide');chev.classList.add('op');}
  }));
}
function liveStanding(mid){
  const m=STATE.matches.find(x=>x.id===mid);if(!m||m.stage!=="group"||m.group!==GSEL)return;
  const myMap=myMapNow();
  const ms=STATE.matches.filter(x=>x.stage==="group"&&x.group===GSEL);
  const el=$("#v-grupos .stand");
  if(el)el.outerHTML=standHTML(ms,myMap);
  const done=ms.filter(x=>{const d=DIRTY[x.id],mn=myMap[x.id]||{};return (d&&d.home!=='')||mn.home!=null;}).length;
  const st=$("#v-grupos .phead .st");
  if(st){st.textContent=`${done}/${ms.length}`;st.classList.toggle("full",done===ms.length);}
}
function wireGroupOrder(){
  const saveOrder=async(g,order)=>{
    try{
      await api("/api/group-order",{method:"POST",body:JSON.stringify({group:g,order})});
      toast("Orden del grupo guardado");
      STATE=await api("/api/state");
      // repinta solo la vista admin sin saltar; mantén la pestaña
      renderResultados();renderGrupos();renderEspeciales();renderRanking();
    }catch(e){toast(e.message);}
  };
  const curOrder=g=>((STATE.standings||{})[g]||[]).map(r=>r.team);
  $$('#v-resultados .otup,#v-resultados .otdn').forEach(btn=>btn.addEventListener('click',()=>{
    const g=btn.dataset.g, i=+btn.dataset.i, up=btn.classList.contains('otup');
    const order=curOrder(g); const j=up?i-1:i+1;
    if(j<0||j>=order.length)return;
    [order[i],order[j]]=[order[j],order[i]]; // intercambia
    saveOrder(g,order);
  }));
  $$('#v-resultados .otreset').forEach(btn=>btn.addEventListener('click',()=>saveOrder(btn.dataset.g,[])));
}
function wireSpecials(){
  $$('input[data-sp]').forEach(inp=>inp.addEventListener('change',async()=>{
    try{await api("/api/special",{method:"POST",body:JSON.stringify({kind:inp.dataset.sp,pick:inp.value})});
      STATE.mySpecials[inp.dataset.sp]=inp.value.trim();toast("Apuesta guardada");}catch(e){toast(e.message);}
  }));
  $$('input[data-spoff]').forEach(inp=>inp.addEventListener('change',async()=>{
    try{await api("/api/special-official",{method:"POST",body:JSON.stringify({kind:inp.dataset.spoff,pick:inp.value})});
      toast("Oficial guardado");STATE=await api("/api/state");renderEspeciales();renderRanking();}catch(e){toast(e.message);}
  }));
}
function wireAdmin(){
  const send=async (mid,srcEl)=>{
    const home=$(`input[data-adm="${mid}"][data-side="home"]`).value;
    const away=$(`input[data-adm="${mid}"][data-side="away"]`).value;
    const tH=$(`input[data-team="${mid}"][data-side="home"]`),tA=$(`input[data-team="${mid}"][data-side="away"]`);
    const body={matchId:mid,home,away};
    if(tH&&tA){body.homeTeam=tH.value||"Por definir";body.awayTeam=tA.value||"Por definir";}
    try{
      await api("/api/result",{method:"POST",body:JSON.stringify(body)});
      // actualizar SOLO el estado en memoria, sin repintar ni mover el scroll
      const m=STATE.matches.find(x=>x.id===mid);
      if(m){
        m.homeScore=home===''?null:+home;
        m.awayScore=away===''?null:+away;
        if(tH&&tA){m.home=body.homeTeam;m.away=body.awayTeam;}
      }
      // marca la fila como guardada (verde) sin reconstruirla
      const row=srcEl.closest(".arow");
      if(row){row.classList.toggle("filled",home!==''&&away!=='');}
      ADMIN_DIRTY=true;
      toast("Resultado guardado");
    }catch(e){toast(e.message);}
  };
  $$('input[data-adm]').forEach(i=>i.addEventListener('change',()=>send(+i.dataset.adm,i)));
  $$('input[data-team]').forEach(i=>i.addEventListener('change',()=>send(+i.dataset.team,i)));
}
function scheduleSave(){clearTimeout(SAVE_TIMER);SAVE_TIMER=setTimeout(saveAll,800);}
function updateSavebar(){
  const n=Object.values(DIRTY).filter(d=>d.home!==''&&d.away!=='').length;
  const bar=$("#savebar");
  if(n>0){bar.classList.add("show");$("#saveStatus").textContent=`${n} pronóstico${n===1?'':'s'} sin guardar`;}
  else bar.classList.remove("show");
}
$("#saveBtn").onclick=saveAll;
async function saveAll(){
  const preds=Object.entries(DIRTY).filter(([,d])=>d.home!==''&&d.away!=='').map(([mid,d])=>({matchId:+mid,home:d.home,away:d.away}));
  if(!preds.length)return;
  $("#saveStatus").textContent="Guardando…";
  try{const res=await api("/api/predict-batch",{method:"POST",body:JSON.stringify({predictions:preds})});
    preds.forEach(p=>{const ex=STATE.myPredictions.find(x=>x.matchId===p.matchId);
      if(ex){ex.home=p.home;ex.away=p.away;}else STATE.myPredictions.push({matchId:p.matchId,home:p.home,away:p.away});});
    DIRTY={};updateSavebar();toast(`Guardado · ${res.saved}`);renderRanking();
    if(VIEW==="grupos")renderGrupos();
  }catch(e){$("#saveStatus").textContent=e.message;toast(e.message);}
}
boot();
</script>
